<!DOCTYPE html>
<html lang="fr">
<head>

<title>KayzWorld</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
background:#081529;

}

header{
background:linear-gradient(90deg,#0d2342,#133a73);
padding:25px;
text-align:center;
box-shadow:0 0 20px #00bfff55;

header img{
width:120px;
border-radius:30px;
}

h1{
margin-top:15px;
